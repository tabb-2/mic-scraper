name: MIC Enrich

on:
  workflow_dispatch:
    inputs:
      batch_cats:
        description: "Категорий за один run (default: 100)"
        required: false
        default: "100"

concurrency:
  group: mic-enrich
  cancel-in-progress: false

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 370

    steps:
      - name: Random delay
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 1800))

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3==1.34.101 playwright==1.44.0 tenacity==8.2.3

      - name: Install Playwright browsers
        run: |
          python -m playwright install chromium
          sudo python -m playwright install-deps chromium

      - name: Run enricher
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET: tebiz-data
          S3_PREFIX: parsed/mic
          BATCH_CATS: ${{ github.event.inputs.batch_cats || '100' }}
          MAX_RUNTIME_MIN: "300"
        run: python3 mic_enrich_worker.py

      - name: Notify Telegram
        if: always()
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python3 - <<'EOF'
          import os, json, urllib.request

          token = os.environ.get("TG_BOT_TOKEN", "")
          chat_id = os.environ.get("TG_CHAT_ID", "")
          status = os.environ.get("JOB_STATUS", "unknown")

          emoji = "✅" if status == "success" else "❌" if status == "failure" else "⚠️"
          text = f"{emoji} MIC Enrich — {status.upper()}"

          if token and chat_id:
              data = json.dumps({"chat_id": chat_id, "text": text}).encode()
              req = urllib.request.Request(
                  f"https://api.telegram.org/bot{token}/sendMessage",
                  data=data,
                  headers={"Content-Type": "application/json"}
              )
              urllib.request.urlopen(req, timeout=10)
          EOF
