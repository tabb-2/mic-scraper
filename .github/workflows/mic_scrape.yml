name: MIC Scraper

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Categories per run (default: 60)"
        required: false
        default: "60"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 370

    steps:
      - name: Random delay
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 3600))

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3==1.34.101 beautifulsoup4==4.12.3 lxml==5.2.1

      - name: Check S3 progress
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
        run: python3 mic_check_progress.py

      - name: Run MIC worker
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET: tebiz-data
          S3_PREFIX: parsed/mic
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '60' }}
          MAX_RUNTIME_MIN: "300"
        run: python3 mic_gha_worker.py

      - name: Notify Telegram
        if: always()
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: python3 mic_notify.py
