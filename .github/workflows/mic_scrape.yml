name: MIC Scraper

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Categories per run (default: 999)"
        required: false
        default: "999"

# Запрещает два run параллельно — без этого оба пишут в одну checkpoint
concurrency:
  group: mic-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 370

    steps:
      - name: Random delay
        if: github.event_name == 'schedule'
        run: sleep $((RANDOM % 3600))

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install boto3==1.34.101 beautifulsoup4==4.12.3 lxml==5.2.1 tenacity==8.2.3

      - name: Download checkpoint artifact (resume after crash/cancel)
        uses: actions/download-artifact@v4
        with:
          name: mic-checkpoint
          path: .
        continue-on-error: true

      - name: Check S3 progress
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
        run: python3 mic_check_progress.py

      - name: Run MIC worker
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          YC_BUCKET: tebiz-data
          S3_PREFIX: parsed/mic
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '999' }}
          MAX_RUNTIME_MIN: "300"
          CHECKPOINT_ARTIFACT: checkpoint_artifact.json
        run: python3 mic_gha_worker.py

      - name: Upload checkpoint artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mic-checkpoint
          path: checkpoint_artifact.json
          retention-days: 7
          overwrite: true

      - name: Notify Telegram
        if: always()
        env:
          YC_ACCESS_KEY_ID: ${{ secrets.YC_ACCESS_KEY_ID }}
          YC_SECRET_ACCESS_KEY: ${{ secrets.YC_SECRET_ACCESS_KEY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          JOB_STATUS: ${{ job.status }}
        run: python3 mic_notify.py
